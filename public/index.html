<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="output.css">
    <title>Counter</title>
</head>

<body class="flex justify-center items-center min-h-screen">
    <div class="flex flex-col items-center gap-10 bg-white rounded-lg p-10 shadow-2xl"> <!--Main Container-->
        <div class="flex flex-row gap-10 shrink"> <!--Timer numbers-->
            <div>
                <span id="hours" class="text-[50px] text-gray-500 md:text-[200px]">00</span>
                <span class="opacity-50 font-mono text-[10px] md:text-[20px]">Hours</span>
            </div>

            <div>
                <span id="minutes" class="text-[50px] text-gray-500 md:text-[200px]">00</span>
                <span class="opacity-50 font-mono text-[10px] md:text-[20px]">Minutes</span>                
            </div>

            <div>
                <span id="seconds" class="text-[50px] text-gray-500 md:text-[200px]">00</span>
                <span class="opacity-50 font-mono text-[10px] md:text-[20px]">Seconds</span>
            </div>
        </div>

        <div class="flex gap-10 shrink"> <!--Buttons-->
            <button id="start" class="border-gray-700 border-2 rounded-lg p-3 bg-gray-700 text-white cursor-pointer hover:bg-gray-900 transition-color duration-300 delay-100 hover:-translate-y-1 hover:shadow-" onclick="start()">Start</button>
            <button id="pause" class="border-gray-700 border-2 rounded-lg p-3 bg-gray-700 text-white cursor-pointer hover:bg-gray-900 transition-color duration-300 delay-100 hover:-translate-y-1 hover:shadow-" onclick="pause()">Pause</button>
            <button id="reset" class="border-gray-700 border-2 rounded-lg p-3 bg-gray-700 text-white cursor-pointer hover:bg-gray-900 transition-color ease-in-out duration-300 delay-100 hover:-translate-y-1 hover:shadow-" onclick="reset()">Reset</button>
        </div>
    </div>

    <script src="index.js"></script>
</body>
</html>
